<script>
  // Baru di bawahnya masukkan config Bapak
 // PASTIKAN BERSIH SEPERTI INI:
const SUPABASE_URL = 'https://tnckidxqtloybtlksjxs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRuY2tpZHhxdGxveWJ0bGtzanhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NzgwMTEsImV4cCI6MjA4NzM1NDAxMX0.rgutBW-ge6mZWFxz5rWGcSN4Ko7DVrW0OIylF4iiD-I';
  
  // Pastikan variabel 'supabase' (huruf kecil semua) dipanggil untuk membuat klien
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let cloudData = [];
    

// --- FUNGSI AUTO-FILL (PINDAH DATA DARI TABEL KE FORM INPUT) ---
function isiFormInput(data) {
    // 1. Isi Data Utama (Sesuaikan ID dengan elemen <input id="..."> di HTML Bapak)
    if(document.getElementById('nomor_notif')) document.getElementById('nomor_notif').value = data.nomor_notif || "";
    if(document.getElementById('plant')) document.getElementById('plant').value = data.plant || "";
    if(document.getElementById('area')) document.getElementById('area').value = data.area || "";
    if(document.getElementById('nomor_item')) document.getElementById('nomor_item').value = data.nomor_item || "";
    if(document.getElementById('deskOrder')) document.getElementById('deskOrder').value = data.deskripsi || "";
    if(document.getElementById('penerima')) document.getElementById('penerima').value = data.penerima_order || "";

    // 2. Isi Data Progress (Sesuaikan ID-nya)
    if(document.getElementById('progRange')) {
        document.getElementById('progRange').value = data["progres"] || "0";
        updateProgUI(); // Panggil ini supaya angka % di layar ikut berubah
    }
    if(document.getElementById('manpower')) document.getElementById('manpower').value = data.manpower || "";
    if(document.getElementById('kendala')) document.getElementById('kendala').value = data.kendala || "-";
    if(document.getElementById('resume')) document.getElementById('resume').value = data.resume || "";
    if(document.getElementById('analisa')) document.getElementById('analisa').value = data.analisa || "";
    if(document.getElementById('tindakan_pekerjaan')) {
        // Memanggil 'tindakan_pekerjaan' dari objek data hasil fetch database
        document.getElementById('tindakan_pekerjaan').value = data.tindakan_pekerjaan || "";
    }

    // 3. Efek Visual
    window.scrollTo({ top: 0, behavior: 'smooth' });

    // 4. Logika Lock
    const isFinish = (data["progres"] >= 100 || data.status === "Finish");
    const btnSave = document.querySelector('.btn-save');
    const btnTerima = document.querySelector('.btn-terima');

    if (isFinish) {
        if(btnSave) btnSave.style.display = 'none';
        if(btnTerima) btnTerima.style.display = 'none';
        alert("ℹ️ Data ini sudah FINISH (100%). Form dikunci (Read-Only).");
    } else {
        if(btnSave) btnSave.style.display = 'block';
        if(btnTerima) btnTerima.style.display = 'block';
    }
}

// --- INISIALISASI SAAT HALAMAN DIBUKA ---
window.onload = async () => {
    // 1. Jalankan Jam & Cek Koneksi Real-time
    setInterval(() => {
        // Update Jam
        const jamElement = document.getElementById('formClock');
        if (jamElement) jamElement.innerText = new Date().toLocaleTimeString('id-ID');

        // Update Warna Cloud Berdasarkan Sinyal Browser
        const icon = document.getElementById('icon');
        const statusText = document.getElementById('syncStatusText');
        
        if (navigator.onLine) {
            // Jika Online (Hijau)
            if(icon) icon.style.filter = "drop-shadow(0 0 5px #4ade80) sepia(100%) saturate(1000%) hue-rotate(80deg)";
            if(statusText) {
                statusText.innerText = "ONLINE";
                statusText.style.color = "#4ade80";
            }
        } else {
            // Jika Offline (Merah)
            if(icon) icon.style.filter = "drop-shadow(0 0 5px #ff4d4d) sepia(100%) saturate(1000%) hue-rotate(-50deg)";
            if(statusText) {
                statusText.innerText = "OFFLINE";
                statusText.style.color = "#ff4d4d";
            }
        }
    }, 1000); // Cek tiap 1 detik

    // 2. Ambil Data Awal
    await fetchDataDariSupabase(); 
    await fetchManpower();
};
// --- FUNGSI AMBIL DATA DARI SUPABASE ---
async function fetchDataDariSupabase() {
    const icon = document.getElementById('icon');
    const statusText = document.getElementById('syncStatusText');

    try {
        const { data, error } = await _supabase
            .from('pekerjaan')
            .select('*')
            .order('nomor_notif', { ascending: false });

        if (error) throw error;

        // --- JIKA BERHASIL (HIJAU) ---
        if (icon) {
            icon.style.color = "#4ade80"; 
            // Filter ini rahasianya Pak, supaya emoji awan ikut jadi hijau
            icon.style.filter = "drop-shadow(0 0 5px #4ade80) sepia(100%) saturate(1000%) hue-rotate(80deg)";
        }
        if (statusText) {
            statusText.innerText = "ONLINE";
            statusText.style.color = "#4ade80";
        }

        cloudData = data;
        renderTable();

    } catch (err) {
        // --- JIKA GAGAL (MERAH) ---
        if (icon) {
            icon.style.color = "#ff4d4d";
            icon.style.filter = "drop-shadow(0 0 5px #ff4d4d) sepia(100%) saturate(1000%) hue-rotate(-50deg)";
        }
        if (statusText) {
            statusText.innerText = "OFFLINE";
            statusText.style.color = "#ff4d4d";
        }

// MESIN KOMPRESI GAMBAR (Tetap dipertahankan agar database Supabase tidak cepat penuh)
function kompresGambar(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800; 
                let width = img.width;
                let height = img.height;
                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                // Kita kompres ke 0.6 (60%) agar lebih ringan di Supabase
                resolve(canvas.toDataURL('image/jpeg', 0.6)); 
            };
        };
    });
}

// --- 2. FILTER BOX ANTREAN (Daftar Kerja yang Belum Kelar) ---
function filterOutstanding() {
    const plant = document.getElementById('monPlant')?.value;
    const area = document.getElementById('monArea')?.value;
    const status = document.getElementById('monStatus')?.value;
    const listDiv = document.getElementById('listOutstanding');

    if (!listDiv) return;

    if (!cloudData || cloudData.length === 0) {
        listDiv.innerHTML = '<p style="text-align:center; padding:20px; color:#94a3b8; font-size:12px;">🔄 Menghubungkan ke Supabase...</p>';
        return;
    }

    // --- LANGKAH 1: FILTER DASAR (Plant, Area, Status) ---
    let filtered = cloudData.filter(row => {
        const rowPlant = String(row.plant || "");
        const rowArea = String(row.area || "");
        const rowStatus = String(row.status || "").toLowerCase().trim();
        const filterStatus = String(status || "").toLowerCase().trim();

        const matchPlant = !plant || rowPlant === plant;
        const matchArea = !area || rowArea === area;
        
        let matchStatus = false;
        if (!filterStatus) {
            matchStatus = (rowStatus !== "finish" && rowStatus !== "closed");
        } else {
            matchStatus = (rowStatus === filterStatus);
        }

        return matchPlant && matchArea && matchStatus;
    });

    // --- LANGKAH 2: LOGIKA UNIQUE (Hanya ambil 1 data terbaru per Nomor Notif) ---
    // Kita gunakan object untuk menimpa data lama dengan yang ID-nya lebih besar
    const uniqueMap = {};
    filtered.forEach(row => {
        const key = row.nomor_notif;
        if (!uniqueMap[key] || row.id > uniqueMap[key].id) {
            uniqueMap[key] = row;
        }
    });
    
    // Ubah kembali menjadi array agar bisa di-map
    const finalData = Object.values(uniqueMap);

    if (finalData.length === 0) {
        listDiv.innerHTML = '<p style="text-align:center; padding:20px; color:#94a3b8; font-size:12px;">Tidak ada antrean pekerjaan.</p>';
        return;
    }

    // --- LANGKAH 3: RENDER DATA FINAL ---
    listDiv.innerHTML = finalData.map(row => {
        const nNotif = row.nomor_notif || "Tanpa Notif";
        const progres = row.progres || 0;
        const statusDB = row.status || "Outstanding";
        const kendala = row.kendala || "";

        // ... (Logika Label & Warna Bapak tetap sama) ...
        let sLabel = statusDB;
        let color = '#004a99'; 

        if (statusDB.toLowerCase() === 'finish' || statusDB.toLowerCase() === 'closed') {
            sLabel = "Closed"; color = '#16a34a'; 
        } else if (statusDB.toLowerCase() === "waiting approval" || progres >= 100) {
            sLabel = "Verifikasi"; color = '#16a34a'; 
        } else if (kendala && kendala !== "-" && kendala.trim() !== "") {
            sLabel = "Pending"; color = '#ef4444'; 
        } else if (progres > 0) {
            sLabel = "In Progres"; color = '#004a99'; 
        } else {
            sLabel = "Outstanding"; color = '#ea580c'; 
        }

        return `
            <div class="out-item" style="border-bottom:1px solid #eee; padding:12px; display:flex; justify-content:space-between; align-items:center;">
                <div onclick="pilihNotif('${nNotif}')" style="flex:1; cursor:pointer;">
                    <span style="font-weight:bold; color:#004a99">${nNotif}</span><br>
                    <small>${row.plant || '-'} | ${row.area || '-'} | ${row.nomor_item || 'No Item'}</small>
                </div>
                <div style="text-align:right;">
                    <div style="font-weight:bold; color:#333; font-size:12px; margin-bottom:4px;">${progres}%</div>
                    <button class="btn-gold" 
                            style="padding:4px 8px; font-size:10px; border-radius:4px; border:1px solid #000; cursor:pointer;" 
                            onclick="lihatStruk('${row.evidence_form}')">
                        👁️ STRUK
                    </button>
                    <span class="mp-chip" style="background:${color}; color:white; border:none; font-size:10px; padding:2px 8px; border-radius:10px; margin-left:5px; display:inline-block; min-width:60px; text-align:center;">
                        ${sLabel}
                    </span>
                </div>
            </div>
        `;
    }).join('');
}

    // Eksekusi Tampilan (Gunakan Modal jika ada ID isiDetailLog)

function resetFilters() {
    document.getElementById('fPlant').value = "";
    document.getElementById('fArea').value = "";
    document.getElementById('fItem').value = "";
    document.getElementById('fTglAwal').value = "";
    document.getElementById('fTglAkhir').value = "";
    renderHist();
}
function pilihNotif(notif) {
    const data = cloudData.find(r => String(r.nomor_notif) === String(notif));
    if (data) {
        // 1. DATA HEADER (STARK/TETAP)
        document.getElementById('nomor_notif').value = data.nomor_notif || "";
        document.getElementById('nomor_item').value = data.nomor_item || "";
        document.getElementById('plant').value = data.plant || "";
        document.getElementById('area').value = data.area || "";
        document.getElementById('deskOrder').value = data.deskripsi_order || data.deskripsi || "";

        
        // 3. MAPPING HISTORY & PROTEKSI (Hanya yang perlu Riwayat & Kunci)
        const mappingHistory = [
            { id: 'analisa', val: data.analisa },
            { id: 'tindakan_pekerjaan', val: data.tindakan_pekerjaan },
            { id: 'manpower_history', val: data.manpower },
            { id: 'penerima_history', val: data.penerima_order },
            { id: 'kendala', val: data.kendala },
            { id: 'resume', val: data.resume },
            { id: 'evidence', val: data.foto_pekerjaan || "" }
        ];
        mappingHistory.forEach(item => {
        const el = document.getElementById(item.id);
        if (el) {
        const teksLama = (item.val || "").toString().trim();
        // --- TAMBAHAN KHUSUS UNTUK FOTO (Agar tidak kosong saat Edit) ---
        tabunganFotoBase64 = []; // Reset tabungan
        if (data.foto_pekerjaan) {
            // Pecah teks foto dari database dan masukkan ke tabungan
            const listFoto = data.foto_pekerjaan.split(" , ");
            listFoto.forEach(img => {
                if (img.trim() !== "") tabunganFotoBase64.push(img.trim());
            });
            // Jalankan fungsi render preview Bapak agar fotonya tampil di layar
            renderPreviewDariTabungan(); 
        } else {
            // Jika tidak ada foto, bersihkan kotak preview
            if(document.getElementById('fotoPrev')) document.getElementById('fotoPrev').innerHTML = "";
        }
        // ---------------------------------------------------------------
    

        // 1. JIKA DATA KOSONG (Baru atau belum ada riwayat)
        if (teksLama === "" || teksLama === "-" || !teksLama) {
            el.value = ""; // Biarkan kosong agar bersih
            el.placeholder = "Belum ada riwayat, silakan tulis di sini...";
            el.dataset.oldLength = 0;
        } 
        // 2. JIKA SUDAH ADA DATA (Tampilkan data lama tanpa paksa tambah label UPDATE)
        else {
            // Tampilkan data murni dari database
            el.value = teksLama; 
            
            // Simpan panjang teks lama untuk proteksi
            el.dataset.oldLength = teksLama.length;
        }
    }
});

        // 4. UPDATE PROGRESS & UI (Lanjutan yang hilang)
        const progVal = parseInt(data.progres) || 0;
        document.getElementById('progRange').value = progVal;
        updateProgUI();
        // 4. UPDATE PENERIMA (INPUT AKTIF)
        if (document.getElementById('penerima')) {
            document.getElementById('penerima').value = data.penerima_order || "";
        }


        const banner = document.getElementById('statusBanner');
        if (banner) {
            banner.innerText = "STATUS: " + (data.status || "OUTSTANDING").toUpperCase();
            banner.style.background = getStatusColor(data.status);
        }

        const boxAnalisa = document.getElementById('analisa');
        if (boxAnalisa) {
            boxAnalisa.focus();
            boxAnalisa.setSelectionRange(boxAnalisa.value.length, boxAnalisa.value.length);
        }
    } // Penutup if (data)
} // Penutup function pilihNotif

        
       

// Fungsi untuk menggabungkan nama-nama yang dicentang jadi satu teks
function updateManpowerValue() {
    const checked = Array.from(document.querySelectorAll('.mp-check:checked'))
                         .map(el => el.value);
    document.getElementById('manpower').value = checked.join(", ");
}
// --- FUNGSI UPDATE UI PROGRES & BANNER (YANG TERHAPUS) ---
function updateProgUI() {
    const val = document.getElementById('progRange').value;
    const progText = document.getElementById('progText');
    const mainBar = document.getElementById('mainBar');
    const banner = document.getElementById('statusBanner');

    // 1. Update teks persentase
    if(progText) progText.innerText = val + "%";
    
    // 2. Update Progress Bar (Warna & Lebar)
    if(mainBar) {
        mainBar.style.width = val + "%";
        mainBar.innerText = val + "%";
        
        // Perubahan Warna Bar
        if (val < 50) {
            mainBar.style.background = "#dc2626"; // Merah
        } else if (val < 100) {
            mainBar.style.background = "#f59e0b"; // Kuning/Oranye
        } else {
            mainBar.style.background = "#16a34a"; // Hijau
        }
    }

    // 3. Update Status Banner secara Otomatis
    if(banner) {
        if (val == 0) {
            banner.innerText = "STATUS: OUTSTANDING";
            banner.style.background = "#dc2626"; // Merah
        } else if (val == 100) {
            banner.innerText = "STATUS: FINISH";
            banner.style.background = "#16a34a"; // Hijau
        } else {
            banner.innerText = "STATUS: INPROGRES";
            banner.style.background = "#2563eb"; // Biru
        }
    }
}
function getStatusColor(status) {
    const s = (status || "").toLowerCase();
    if (s === 'outstanding') return "#dc2626"; // Merah
    if (s === 'inprogres') return "#004a99";   // Biru
    if (s === 'pending') return "#ff8c00";     // Oranye (Safety Pusri)
    if (s === 'finish') return "#16a34a";      // Hijau
    return "#64748b"; 
}

function lihatStruk(data) {
    if (!data || data === "undefined" || data === "" || data === "-") {
        alert("⚠️ Data link struk kosong.");
        return;
    }

    const modal = document.getElementById('modalStruk');
    const imgDisplay = document.getElementById('imgStruk');
    let srcTujuan = data;

    // Konversi Link Drive ke Direct Link
    if (data.includes("drive.google.com")) {
        let fileId = "";
        if (data.includes("/d/")) {
            fileId = data.split('/d/')[1].split('/')[0];
        } else if (data.includes("id=")) {
            fileId = data.split('id=')[1].split('&')[0];
        }
        if (fileId) {
            srcTujuan = "https://docs.google.com/uc?export=view&id=" + fileId;
        }
    }

    modal.style.display = "flex";
    imgDisplay.src = "https://cdnjs.cloudflare.com/ajax/libs/galleriffic/2.0.1/css/loader.gif"; 

    const tempImg = new Image();
    tempImg.src = srcTujuan;

    tempImg.onload = function() {
        imgDisplay.src = srcTujuan;
    };

    tempImg.onerror = function() {
        modal.style.display = "none";
        // JIKA GAGAL DIMUAT (Biasanya karena proteksi Drive), LANGSUNG BUKA TAB BARU
        if (confirm("⚠️ Gambar tidak bisa tampil langsung di sini karena proteksi Google Drive.\n\nBuka gambar di tab baru?")) {
            window.open(data, '_blank');
        }
    };
}
