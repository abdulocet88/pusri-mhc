<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSRI MHC - Form Order & Monitoring</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --pusri-blue: #004a99;
            --pusri-gold: #ffd700;
            --safety: #ff8c00;
            --success: #16a34a;
            --danger: #dc2626;
            --light: #f4f7fa;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--light);
            margin: 0;
            padding: 0;
        }

        .navbar {
            background: var(--pusri-blue);
            padding: 10px 25px;
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .btn-dash {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 12px;
            border: 1px solid white;
            transition: 0.3s;
        }

        .btn-dash:hover {
            background: var(--pusri-gold);
            color: var(--pusri-blue);
        }

        .container {
            max-width: 1250px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            border-top: 5px solid var(--pusri-gold);
            overflow: hidden;
        }

        .card-header {
            background: #f8f9fa;
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-weight: bold;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        label {
            font-size: 11px;
            font-weight: bold;
            color: #555;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }

        select,
        input,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        input:disabled,
        select:disabled {
            background: #eee;
            cursor: not-allowed;
        }

        .safety-box {
            background: #fffcf0;
            border: 2px dashed var(--safety);
            padding: 15px;
            border-radius: 10px;
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-wa {
            background: #25d366;
            color: white;
            width: 100%;
        }

        .btn-save {
            background: var(--pusri-blue);
            color: white;
            width: 100%;
        }

        .btn-save:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #f4f4f4;
            padding: 12px;
            font-size: 11px;
            text-align: left;
            text-transform: uppercase;
            color: #666;
            border-bottom: 2px solid #ddd;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }

        .hidden {
            display: none;
        }

        /* Style tambahan untuk Progres Bar di tabel */
        .Progres-bg {
            background: #eee;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
            width: 80px;
        }

        .Progres-fill {
            height: 100%;
            transition: 0.3s;
        }

        /* Styling Status di Form Order */
        .form-status-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            line-height: 1.2;
        }

        #syncStatusText {
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .cloud-icon {
            font-size: 20px;
            margin: 2px 0;
            display: inline-block;
            color: white;
            /* Warna default */
            line-height: 1;
            -webkit-text-fill-color: currentColor;
            /* Memaksa warna mengikuti properti 'color' */
        }

        .form-clock {
            font-size: 11px;
            font-family: monospace;
            color: var(--pusri-gold);
        }

        @media print {
            .no-print {
                display: none;
            }
        }
    </style>
</head>

function logicStep4() {

    const a = document.getElementById('fArea').value;

    // 2. JIKA ERROR (Item Tidak Terdaftar)

// Fungsi formatWA tetap sama (tidak berubah)
function formatWA(el) {
    let val = el.value.replace(/\D/g, '');
    if (val.startsWith('0')) val = '62' + val.substring(1);
    el.value = val;
}

        // --- 2. FUNGSI AUTO CHECK & VALIDASI (LOGIKA FINAL) ---
function autoChecknotif() {
    console.log("Mengecek data di Supabase...", cloudData);
    const item = document.getElementById('fItem').value.trim().toUpperCase();
    const dept = document.getElementById('fdepartemen').value;
    const hint = document.getElementById('notifHint');
    const notifInput = document.getElementById('fnotif');
    const btn = document.getElementById('btnSimpan');

    if (!dept || !item) {
        hint.innerHTML = "";
        return;
    }

    // Cari di cloudData yang diambil dari Supabase
    const activeOrder = cloudData.find(row =>
        (row.nomor_item || "").toString().trim().toUpperCase() === item &&
        (row.departemen || "").toString() === dept &&
        (row.status || "").toString().toLowerCase() !== "closed"
    );

    if (activeOrder) {
        // Melanjutkan Notif yang belum Closed di Supabase
        notifInput.value = activeOrder.nomor_notif; 
        notifInput.readOnly = true; 
        notifInput.style.background = "#f0f0f0";
        hint.innerHTML = `<span style="color:blue; font-weight:bold;">ℹ️ MELANJUTKAN NOTIF AKTIF ${dept}: ${activeOrder.nomor_notif}</span>`;
        if (btn) btn.disabled = false; 
    } else {
        // Siklus Baru
        notifInput.value = "";
        notifInput.readOnly = false; 
        notifInput.style.background = "white";
        hint.innerHTML = `<span style="color:green; font-weight:bold;">✨ SIAP UNTUK SIKLUS ORDER BARU</span>`;
        
        if (typeof validatenotifUnique === "function") {
            validatenotifUnique(); 
        }
    }
}

function validatenotifUnique() {
    const notifVal = document.getElementById('fnotif').value.trim().toUpperCase();
    const itemVal = document.getElementById('fItem').value.trim().toUpperCase();
    const dept = document.getElementById('fdepartemen').value;
    const hint = document.getElementById('notifHint');
    const btn = document.getElementById('btnSimpan');

    // 1. Validasi dasar
    if (!notifVal) { 
        if(btn) btn.disabled = true; 
        return; 
    }

    // 2. Jika input dikunci (mode lanjut order), lewati
    if (document.getElementById('fnotif').readOnly) return;

    // 3. Cari di cloudData (pastikan nama kolom menggunakan huruf kecil sesuai Supabase)
    const duplicate = cloudData.find(row =>
        (row.nomor_notif || "").toString().trim().toUpperCase() === notifVal &&
        (row.status || "").toString().toLowerCase() !== "closed"
    );

    if (duplicate) {
        // Ambil data pembanding dari baris yang ditemukan
        const itemLama = (duplicate.nomor_item || "").toString().toUpperCase();
        const deptLama = (duplicate.departemen || "").toString();

        if (itemLama !== itemVal) {
            hint.innerHTML = `<span style="color:red; font-weight:bold;">⚠️ GAGAL: Notif ${notifVal} sudah dipakai Item ${itemLama}!</span>`;
            document.getElementById('fnotif').style.border = "2px solid red";
            if(btn) btn.disabled = true;
        } 
        else if (deptLama !== dept) {
            hint.innerHTML = `<span style="color:red; font-weight:bold;">⚠️ GAGAL: Notif ${notifVal} sudah aktif di Dept: ${deptLama}!</span>`;
            document.getElementById('fnotif').style.border = "2px solid red";
            if(btn) btn.disabled = true;
        }
        else {
            // JIKA ITEM & DEPT SAMA -> BERARTI LANJUTAN ORDER
            hint.innerHTML = `<span style="color:blue; font-weight:bold;">ℹ️ LANJUTKAN ORDER: Notif sesuai dengan Item & Dept.</span>`;
            document.getElementById('fnotif').style.border = "1px solid #ccc";
            if(btn) btn.disabled = false; // AKTIFKAN TOMBOL
        }
    } else {
        // Jika nomor notif belum ada di database
        hint.innerHTML = `<span style="color:green">✅ Nomor notif tersedia</span>`;
        document.getElementById('fnotif').style.border = "1px solid #ccc";
        if(btn) btn.disabled = false;
    }
}

async function pilihKontak() {
    // 1. Cek apakah HP mendukung fitur ini
    const supported = ('contacts' in navigator && 'ContactsManager' in window);
    
    if (supported) {
        try {
            // 2. Tentukan data apa yang mau diambil (Nama dan Nomor HP)
            const props = ['name', 'tel'];
            const opts = { multiple: false }; // Kita cuma butuh 1 kontak

            // 3. Buka daftar kontak HP
            const contacts = await navigator.contacts.select(props, opts);

            if (contacts.length > 0) {
                const kontak = contacts[0];
                let nomor = kontak.tel[0];

                // 4. Bersihkan nomor (Hapus spasi, strip, atau tanda +)
                // Dan pastikan depannya 62 (Format WhatsApp)
                nomor = nomor.replace(/[^0-9]/g, ''); // Ambil angka saja
                if (nomor.startsWith('0')) {
                    nomor = '62' + nomor.slice(1);
                }

                // 5. Masukkan ke input fWA
                document.getElementById('fWA').value = nomor;
                
                // Opsional: Masukkan nama ke input penerima
                if (kontak.name) {
                    document.getElementById('fPenerima').value = kontak.name[0];
                }
            }
        } catch (ex) {
            console.log("Gagal mengambil kontak: " + ex);
        }
    } else {
        alert("Browser kamu tidak mendukung fitur pilih kontak. Silakan ketik manual.");
    }
}
async function pilihKontak() {
    // alert-nya dihapus/dibuang saja
    
    const supported = ('contacts' in navigator && 'ContactsManager' in window);
    
    if (supported) {
        try {
            const props = ['name', 'tel'];
            const opts = { multiple: false };

            const contacts = await navigator.contacts.select(props, opts);

            if (contacts.length > 0) {
                const kontak = contacts[0];
                let nomor = kontak.tel[0];

                // Proses pembersihan nomor WA
                nomor = nomor.replace(/[^0-9]/g, ''); 
                if (nomor.startsWith('0')) {
                    nomor = '62' + nomor.slice(1);
                }

                document.getElementById('fWA').value = nomor;
                
                if (kontak.name) {
                    document.getElementById('fPenerima').value = kontak.name[0];
                }
            }
        } catch (ex) {
            console.log("Gagal mengambil kontak: " + ex);
        }
    } else {
        alert("Browser kamu tidak mendukung fitur pilih kontak. Silakan ketik manual.");
    }
}

// F. LOGIKA CARI PROGRESS TERAKHIR & UPDATE MASSAL

       // --- 4. RENDER TABEL (VERSI SUPABASE - SUPER CEPAT) ---
async function renderTable() {
    const tbody = document.getElementById('historyBody');
    if (!tbody) return;

    // 1. Ambil semua nilai filter (Tetap Sama)
    const fStart = document.getElementById('tFilterStart')?.value || "";
    const fEnd = document.getElementById('tFilterEnd')?.value || "";
    const fP = document.getElementById('tFilterPlant')?.value || "";
    const fA = document.getElementById('tFilterArea')?.value || "";
    const fI = (document.getElementById('tFilterItem')?.value || "").toUpperCase();
    const fN = (document.getElementById('tFilternotif')?.value || "").toUpperCase();
    const fS = document.getElementById('tFilterStatus')?.value || "";
    const fPr = document.getElementById('tFilterProgres')?.value || "";
    const fK = (document.getElementById('tFilterKendala')?.value || "").toUpperCase();
    const fket = (document.getElementById('tFilterDeskripsi')?.value || "").toUpperCase();
    const fDept = document.getElementById('tFilterDept')?.value || "";

    tbody.innerHTML = "<tr><td colspan='11' style='text-align:center;'>🔄 Sinkronisasi Supabase...</td></tr>";

    try {
        // --- 2. AMBIL DATA DARI SUPABASE ---
        // Sesuai logika Bapak: Kita filter di sini agar yang sudah "Finish" atau "Closed" 
        // tidak menumpuk di monitoring utama jika sudah dibukukan.
        const { data: dataSupabase, error } = await _supabase
            .from('pekerjaan')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) throw error;

        cloudData = dataSupabase;
        tbody.innerHTML = "";

        dataSupabase.forEach((row) => {
            const tgl = new Date(row.created_at);
            const waktu = tgl.toLocaleString('id-ID');
            const plant = row.plant || "";
            const area = row.area || "";
            const departemen = row.departemen || "";
            const item = (row.nomor_item || "").toString().trim().toUpperCase();
            const notif = (row.nomor_notif || "").toString(); 
            const pemberi = row.pemberi || "-";
            const penerima = row.penerima || "-";
            const deskripsi = row.deskripsi || "";
            const statusDB = row.status || ""; // Status asli dari database
            const progres = parseInt(row.progres || 0);
            const kendala = row.kendala || "";

            if (typeof hiddennotif !== 'undefined' && hiddennotif.includes(notif)) return;

            // --- 3. LOGIKA LABEL STATUS YANG DISINKRONKAN ---
            let sLabel = statusDB;
            let color = 'var(--pusri-blue)';

            // Perbaikan Logika: Jika status sudah Finish/Closed dari simpanFinal
            if (statusDB.toLowerCase() === 'finish' || statusDB.toLowerCase() === 'closed') {
                sLabel = "Closed"; 
                color = 'var(--success)';
            } else if (statusDB.toLowerCase() === "waiting approval" || progres >= 100) {
                sLabel = "Verifikasi"; 
                color = 'var(--success)';
            } else if (kendala && kendala !== "-") {
                sLabel = "Pending"; 
                color = '#ef4444';
            } else if (progres > 0) {
                sLabel = "In Progres"; 
                color = 'var(--pusri-blue)';
            } else {
                sLabel = "Outstanding"; 
                color = '#ea580c';
            }

            // --- 4. FILTERING (Tetap Sama) ---
            let matchT = true;
            if (fStart || fEnd) {
                const orderDate = row.created_at.split('T')[0];
                matchT = (!fStart || orderDate >= fStart) && (!fEnd || orderDate <= fEnd);
            }
            const matchP = !fP || plant === fP;
            const matchA = !fA || area === fA;
            const matchI = !fI || item.includes(fI);
            const matchN = !fN || notif.includes(fN);
            const matchS = !fS || sLabel.toUpperCase().includes(fS.toUpperCase());
            const matchPr = !fPr || progres.toString().includes(fPr);
            const matchK = !fK || kendala.toUpperCase().includes(fK);
            const matchKet = !fket || deskripsi.toUpperCase().includes(fket);
            const matchDept = !fDept || departemen.toUpperCase() === fDept.toUpperCase();

            // --- 5. RENDER KE TABEL ---
            if (matchP && matchA && matchI && matchKet && matchN && matchT && matchS && matchPr && matchK && matchDept) {
                let tombolApprove = "";
                if (sLabel === "Verifikasi") {
                    tombolApprove = `<button onclick="approvenotif('${notif}')" style="border:none; background:#22c55e; color:white; cursor:pointer; padding:6px 10px; border-radius:4px; font-size:11px; font-weight:bold; margin-bottom:5px; display:block; width:100%;">✅ APPROVE</button>`;
                }

                tbody.innerHTML += `
                    <tr>
                        <td><small>${waktu}</small></td>
                        <td><b>${notif}</b></td> 
                        <td><small>${departemen}</small></td>
                        <td><small>${area}</small></td>
                        <td>${item}<br><small style="color:gray">${plant}</small></td>
                        <td><small>${pemberi} / ${penerima}</small></td>
                        <td><small>${deskripsi}</small></td>
                        <td>
                            <b style="color:${color}">${sLabel}</b>
                            ${(kendala && kendala !== "-") ? `<br><small style="color:orange">⚠️ ${kendala}</small>` : ''}
                            <div class="Progres-bg" style="background:#eee; height:8px; border-radius:4px; margin-top:5px;">
                                <div class="Progres-fill" style="width:${progres}%; background:${color}; height:10px; border-radius:4px;"></div>
                            </div>
                            <span style="font-size:10px">${progres}%</span>
                        </td>
                        <td class="no-print" style="text-align:center; vertical-align:middle;">
                            ${tombolApprove}
                            <button onclick="hapusLokal('${notif}')" style="border:none; background:none; cursor:pointer; font-size:16px;">🗑️</button>
                        </td>
                    </tr>`;
            }
        });
    } catch (err) {
        console.error("Error Detail:", err);
        tbody.innerHTML = "<tr><td colspan='11' style='text-align:center; color:red;'>Gagal Sinkron Supabase.</td></tr>";
    }
}

async function checkSyncStatus() {
    const icon = document.getElementById('icon');
    const statusText = document.getElementById('syncStatusText');

    if (!icon || !statusText) return;

    if (navigator.onLine) {
        try {
            // Cek koneksi dengan melakukan "Ping" ringan ke Supabase
            // Kita cuma minta 1 baris data saja (limit 1) biar hemat kuota
            const { error } = await _supabase.from('pekerjaan').select('id').limit(1);
            
            if (error) throw error;

            // Jika sukses: Hijau (Online)
            icon.style.filter = "drop-shadow(0 0 5px #48bb78) sepia(100%) hue-rotate(90deg) saturate(500%)";
            statusText.innerText = "SUPABASE ONLINE";
            statusText.style.color = "white"; // Sesuaikan dengan navbar Bapak
        } catch (e) {
            // Jika internet ada tapi Supabase tidak respon (Server Busy)
            statusText.innerText = "DATABASE BUSY";
            icon.style.filter = "drop-shadow(0 0 5px #ffd700) sepia(100%) hue-rotate(10deg) saturate(500%)";
        }
    } else {
        // Jika kabel internet putus/tidak ada sinyal
        icon.style.filter = "drop-shadow(0 0 5px #f87171) sepia(100%) hue-rotate(0deg) saturate(500%)";
        statusText.innerText = "OFFLINE";
        statusText.style.color = "#f87171";
    }
}

        async function kompresGambar(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        // Mengecilkan resolusi ke 1024px (lebar) agar tidak pecah tapi ringan
                        const MAX_WIDTH = 1024;
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Hasil akhirnya adalah teks (Base64) dengan kualitas 0.6 (60%)
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        }

function hapusLokal(notif) {
